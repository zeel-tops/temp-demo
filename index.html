<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Todo App</h1>

    <form id="todo-form" class="todo-form" autocomplete="off">
      <input
        type="text"
        id="todo-input"
        class="todo-input"
        placeholder="What needs to be done?"
        aria-label="New todo"
        required
      />
      <button type="submit" class="btn btn-add">Add</button>
    </form>

    <div class="filters" role="tablist" aria-label="Filter todos">
      <button type="button" class="filter active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button type="button" class="filter" data-filter="active" role="tab" aria-selected="false">Active</button>
      <button type="button" class="filter" data-filter="completed" role="tab" aria-selected="false">Completed</button>
    </div>

    <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

    <div class="footer">
      <span id="items-left" class="items-left">0 items left</span>
      <button type="button" id="clear-completed" class="btn btn-clear">Clear completed</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
